# Template for .dlt/secrets.toml — copy and fill in:
#   cp .dlt/secrets.example.toml .dlt/secrets.toml
#
# The real secrets.toml is gitignored and must NEVER be committed.
# In deployment, use the equivalent env vars instead (TOML path maps to
# __-separated uppercase), e.g.:
#   DESTINATION__FILESYSTEM__CREDENTIALS__AWS_ACCESS_KEY_ID
#   DESTINATION__FILESYSTEM__CREDENTIALS__AWS_SECRET_ACCESS_KEY
#   DESTINATION__FILESYSTEM__CREDENTIALS__ENDPOINT_URL
#   DATASOURCES__MDHARURA__API_TOKEN

[destination.filesystem.credentials]
# MinIO access key (local dev default: minioadmin / minioadmin)
aws_access_key_id = "minioadmin"
aws_secret_access_key = "minioadmin"
# your MinIO server — remove this line only for AWS S3
endpoint_url = "http://localhost:9000"

# API tokens per data source, read via dlt.secrets["datasources.<name>.<key>"]
# [datasources.mdharura]
# api_token = "REPLACE_ME"

# CBS Integration API key (Admin -> API Keys in the CBS web app)
[datasources.cbs]
api_key = "REPLACE_ME"
